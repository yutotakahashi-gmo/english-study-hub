<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#3b5bdb">
<title>English Study Hub</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="English Hub">
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
  color: #232a36; line-height: 1.6;
  background:
    radial-gradient(1200px 500px at 10% -10%, #eef2ff 0, rgba(238,242,255,0) 60%),
    radial-gradient(900px 500px at 100% 0%, #fff0f6 0, rgba(255,240,246,0) 55%),
    #f6f7fb;
  -webkit-text-size-adjust: 100%;
}
.wrap { max-width: 1060px; margin: 0 auto; padding: 16px 14px 70px; }
header.hero {
  position: relative; overflow: hidden;
  background: linear-gradient(135deg, #1b2a6b 0%, #3b5bdb 50%, #7048e8 100%);
  color: #fff; border-radius: 20px; padding: 22px 22px 20px; margin-bottom: 16px;
  box-shadow: 0 12px 34px rgba(48,63,159,.28);
}
header.hero::after{ content:""; position:absolute; right:-40px; top:-50px; width:200px; height:200px;
  background: radial-gradient(circle, rgba(255,255,255,.18), rgba(255,255,255,0) 70%); }
.hero h1 { margin: 0 0 4px; font-size: 1.5rem; letter-spacing:.3px; }
.hero .sub { font-size: .82rem; opacity: .92; }
.goal { margin-top: 13px; display:flex; flex-wrap:wrap; gap:8px; }
.goal .pill { background: rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.28);
  padding: 5px 12px; border-radius: 999px; font-size: .8rem; font-weight:600; }
.goal .pill small{ font-weight:400; opacity:.85; }
.meta-row { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px; margin-top:13px; font-size:.72rem; opacity:.95;}

.toolbar { position: sticky; top: 0; z-index: 5; padding: 10px 0 8px;
  background: linear-gradient(#f6f7fb 70%, rgba(246,247,251,0)); }
.search-box { position: relative; }
.search-box input {
  width: 100%; padding: 14px 16px 14px 44px; font-size: 16px; border: 1px solid #dfe3ec;
  border-radius: 14px; background:#fff; outline: none; box-shadow: 0 2px 10px rgba(40,60,120,.05);
  transition: border-color .15s, box-shadow .15s;
}
.search-box input:focus { border-color:#7048e8; box-shadow: 0 0 0 4px rgba(112,72,232,.14); }
.search-box .icon { position:absolute; left:15px; top:50%; transform:translateY(-50%); color:#9aa3b2; font-size:1.05rem; }
.search-box .clear { position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer; color:#9aa3b2; border:none; background:none; font-size:1.4rem; display:none; padding:4px 8px; }

.chips { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; margin-top:10px; }
.chip {
  border:1px solid #e0e4ee; background:#fff; color:#3a4253; padding:8px 8px; border-radius:14px;
  font-size:.78rem; cursor:pointer; transition: all .12s; display:flex; align-items:center; justify-content:center;
  gap:5px; user-select:none; text-align:center; line-height:1.2; min-height:44px; overflow:hidden;
}
.chip .nmv{ overflow:hidden; text-overflow:ellipsis; }
.chip .dot{ width:9px; height:9px; border-radius:50%; background:var(--ac,#888); flex:none; }
.chip .num{ font-size:.92rem; line-height:1; flex:none; }
.cat-head .num{ font-size:1.15rem; line-height:1; flex:none; }
.chip:active { transform: scale(.96); }
.chip.active { color:#fff; border-color:transparent; background:var(--ac,#3b5bdb); box-shadow:0 4px 12px rgba(0,0,0,.14); }
.chip.active .dot{ background:#fff; }
.chip .cnt { font-size:.7rem; background:rgba(0,0,0,.07); padding:1px 7px; border-radius:999px; }
.chip.active .cnt { background:rgba(255,255,255,.28); }

.section { margin-top: 24px; }
.section h2 { font-size:1.06rem; margin:0 0 11px; display:flex; align-items:center; gap:10px; }
.section h2 .ic { width:30px; height:30px; border-radius:9px; display:flex; align-items:center; justify-content:center;
  font-size:1rem; background:var(--ac,#3b5bdb); color:#fff; box-shadow:0 3px 8px rgba(0,0,0,.14); }
.section h2 .badge { font-size:.7rem; font-weight:700; color:var(--ac,#5c7cfa); background:rgba(0,0,0,.04); padding:2px 9px; border-radius:999px; }

/* table-of-contents style (no flashcards) */
.cat { margin-top:22px; }
.cat-head { display:flex; align-items:center; gap:11px; padding:13px 15px; background:#fff; border:1px solid #e9ecf3;
  border-left:5px solid var(--ac,#c9d2ea); border-radius:14px; cursor:pointer; box-shadow:0 1px 3px rgba(40,60,120,.05); }
.cat-head:hover { box-shadow:0 6px 16px rgba(60,80,160,.10); }
.cat-head:active { transform:scale(.997); }
.cat-head .ic { width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;background:var(--ac,#3b5bdb);color:#fff;flex:none; }
.cat-head .nm { font-weight:800; font-size:1.04rem; flex:1; }
.cat-head .badge { font-size:.7rem;font-weight:700;color:var(--ac,#5c7cfa);background:rgba(0,0,0,.05);padding:2px 9px;border-radius:999px; }
.cat-head .chev2 { color:var(--ac,#b9c2d6); font-weight:700; font-size:1.05rem; }
.sublist { margin:7px 0 0; border:1px solid #eef0f5; border-radius:12px; overflow:hidden; background:#fff; }
.grp-h { font-size:.66rem; color:#8a93a3; letter-spacing:.4px; padding:9px 15px 4px; background:#fafbfe; font-weight:600; }
.row { display:flex; align-items:center; gap:10px; padding:12px 15px; border-top:1px solid #f1f3f8; cursor:pointer; font-size:.93rem; color:#26303f; }
.row:first-child { border-top:none; }
.grp-h + .row { border-top:none; }
.row:hover { background:#f6f8ff; }
.row:active { background:#eef1fe; }
.row .rtit { flex:1; }
.row .chev2 { color:#c3cbdc; font-weight:700; }
.row.openself { color:var(--ac,#3b5bdb); font-weight:600; }
.row mark.q { background:#ffe066; padding:0 2px; border-radius:3px; }

.empty { text-align:center; color:#97a0b0; padding:40px 10px; font-size:.9rem; }
.foot { margin-top:30px; text-align:center; font-size:.72rem; color:#aab2c0; }

/* reader */
.reader { position: fixed; inset: 0; z-index: 50; background:#fbfbfd; display:none; flex-direction:column; }
.reader.open { display:flex; animation: rin .18s ease; }
@keyframes rin { from { opacity:.4; transform: translateY(6px);} to{ opacity:1; transform:none;} }
.reader-head {
  display:flex; align-items:center; gap:10px; padding: 12px 14px; padding-top: max(12px, env(safe-area-inset-top));
  border-bottom:1px solid #ebedf3; background:#fff; position:sticky; top:0;
}
.reader-head .back { border:none; background:#eef1fe; color:#4263eb; font-size:.9rem; font-weight:700; padding:9px 14px; border-radius:11px; cursor:pointer; white-space:nowrap; }
.reader-head .back:active { background:#dbe2fb; }
.reader-head .rtitle { font-weight:800; font-size:1.02rem; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.reader-head .rclose { border:none; background:none; font-size:1.5rem; color:#9aa3b2; cursor:pointer; padding:4px 8px; }
.crumbs { font-size:.72rem; color:#9aa3b2; padding:7px 18px 0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.reader-body { overflow-y:auto; -webkit-overflow-scrolling:touch; padding: 10px 20px 70px; flex:1; }
.reader-body .doc { max-width: 740px; margin: 0 auto; }

.doc h1 { font-size:1.55rem; margin:18px 0 12px; line-height:1.3; }
.doc h2 { font-size:1.22rem; margin:26px 0 10px; padding-left:11px; border-left:5px solid var(--rac,#7048e8); line-height:1.35; }
.doc h3 { font-size:1.06rem; margin:20px 0 7px; color:#2b2350; }
.doc h4 { font-size:.96rem; margin:15px 0 5px; color:#41506b; }
.doc p { margin:10px 0; }
.doc ul, .doc ol { margin:9px 0; padding-left:24px; }
.doc li { margin:5px 0; }
.doc li::marker { color:#9b8cf0; }
.doc hr { border:none; border-top:1px dashed #d9dde6; margin:20px 0; }
.doc code { background:#eef0f6; padding:1.5px 6px; border-radius:6px; font-size:.86em; color:#5a3ec8; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
.doc pre { background:#161a2e; color:#e6e9f5; padding:14px 16px; border-radius:12px; overflow-x:auto; font-size:.82rem; line-height:1.5; }
.doc pre code { background:none; padding:0; color:inherit; }
.doc blockquote { margin:12px 0; padding:11px 15px 11px 14px; border-left:4px solid #ffd43b; background:#fffbe8; color:#6b5b14; border-radius:0 10px 10px 0; }
.doc table { border-collapse:separate; border-spacing:0; width:100%; margin:14px 0; font-size:.88rem; display:block; overflow:hidden auto; border:1px solid #e6e9f0; border-radius:12px; }
.doc th, .doc td { border-bottom:1px solid #eceff4; padding:9px 11px; text-align:left; vertical-align:top; }
.doc tr:last-child td { border-bottom:none; }
.doc th { background:#f3f0ff; font-weight:800; color:#3b2f73; }
.doc tr:nth-child(even) td { background:#fafbfe; }
.doc a.ext { color:#4263eb; word-break:break-all; }
.doc a.rlink { display:inline-flex; align-items:center; gap:5px; background:#eef1fe; color:#3a2db8; padding:8px 13px; border-radius:11px; text-decoration:none; font-weight:700; font-size:.92rem; margin:4px 5px 4px 0; cursor:pointer; border:1px solid #e0e3fb; }
.doc a.rlink:hover { background:#e4e8ff; }
.doc a.rlink .chev { color:#8f7ff0; }
.doc .imgph { display:inline-block; background:#eef0f6; color:#8a93a3; padding:5px 11px; border-radius:9px; font-size:.8rem; }

/* fallback for un-baked pages */
.fallback { text-align:center; padding:46px 18px; color:#5a6478; }
.fallback .fbicon { font-size:2.4rem; }
.fallback p { margin:10px 0; }
.fallback .fbbtn { display:inline-block; margin-top:6px; background:var(--rac,#4263eb); color:#fff; text-decoration:none; padding:11px 20px; border-radius:12px; font-weight:700; }
.fallback .fbnote { font-size:.74rem; color:#97a0b0; margin-top:18px; }

/* 蛍光ペン */
.doc mark.hl { color:#1f2430; padding:0 3px; border-radius:2px; font-weight:600; box-decoration-break: clone; -webkit-box-decoration-break: clone; }
.hl-yellow { background: linear-gradient(104deg, rgba(255,241,118,0) 0.5%, #ffee58 2%, rgba(255,238,88,.78) 96%, rgba(255,241,118,0) 99%); }
.hl-green  { background: linear-gradient(104deg, rgba(105,240,174,0) 0.5%, #69f0ae 2%, rgba(105,240,174,.72) 96%, rgba(105,240,174,0) 99%); }
.hl-blue   { background: linear-gradient(104deg, rgba(129,212,250,0) 0.5%, #81d4fa 2%, rgba(129,212,250,.72) 96%, rgba(129,212,250,0) 99%); }
.hl-pink   { background: linear-gradient(104deg, rgba(248,187,208,0) 0.5%, #f8bbd0 2%, rgba(248,187,208,.78) 96%, rgba(248,187,208,0) 99%); }
.hl-orange { background: linear-gradient(104deg, rgba(255,204,128,0) 0.5%, #ffcc80 2%, rgba(255,204,128,.78) 96%, rgba(255,204,128,0) 99%); }
.hl-purple { background: linear-gradient(104deg, rgba(206,147,216,0) 0.5%, #ce93d8 2%, rgba(206,147,216,.7) 96%, rgba(206,147,216,0) 99%); }
.hl-red    { background: linear-gradient(104deg, rgba(255,171,145,0) 0.5%, #ffab91 2%, rgba(255,171,145,.72) 96%, rgba(255,171,145,0) 99%); }
.hl-brown  { background: linear-gradient(104deg, rgba(215,204,200,0) 0.5%, #d7ccc8 2%, rgba(215,204,200,.8) 96%, rgba(215,204,200,0) 99%); }
.hl-gray   { background: linear-gradient(104deg, rgba(224,224,224,0) 0.5%, #e0e0e0 2%, rgba(224,224,224,.85) 96%, rgba(224,224,224,0) 99%); }
.tc-red{color:#e03131;font-weight:600}.tc-blue{color:#1971c2;font-weight:600}.tc-green{color:#2f9e44;font-weight:600}
.tc-orange{color:#e8590c;font-weight:600}.tc-purple{color:#7048e8;font-weight:600}.tc-pink{color:#c2255c;font-weight:600}
.tc-brown{color:#846358;font-weight:600}.tc-gray{color:#868e96}.tc-yellow{color:#f08c00;font-weight:600}

@media (max-width:560px){ .hero h1 { font-size:1.28rem; } .grid { grid-template-columns: 1fr 1fr; } .reader-body { padding: 10px 15px 70px; } }
@media (max-width:380px){ .grid { grid-template-columns: 1fr; } }

/* proto UI overrides */
.goal .pill{ background:none!important; border:none!important; padding:0!important; }
.goal{ gap:4px 16px!important; font-size:.9rem; }
.sublist{ display:grid!important; grid-template-columns:1fr 1fr!important; gap:8px!important; border:none!important; background:none!important; border-radius:0!important; overflow:visible!important; }
.sublist .row{ border:1px solid #eef0f5!important; border-radius:10px!important; }
.sublist .grp-h{ grid-column:1/-1; }
@media(max-width:560px){ .sublist{ grid-template-columns:1fr!important; } }
.acadwrap .pdict-sec{ font-weight:800; font-size:.95rem; color:#0f172a; border-bottom:2px solid #1f2937; padding-bottom:6px; margin:22px 0 14px; }
.acadwrap .pdict-entry{ margin:0 0 20px; }
.acadwrap .pdict-head{ display:flex; align-items:baseline; flex-wrap:wrap; gap:8px; margin-bottom:8px; }
.acadwrap .pdict-hw{ font-weight:800; font-size:1.12rem; color:#0f172a; border-bottom:2px solid #dc2626; line-height:1.2; }
.acadwrap .pdict-jp{ font-size:.82rem; color:#334155; }
.acadwrap .pdict-meta{ margin-left:auto; font-size:.68rem; color:#64748b; white-space:nowrap; }
.acadwrap .pdict-chips{ display:flex; flex-wrap:wrap; gap:6px; }
.acadwrap .para-pill{ background:#fff; color:#0f172a; border:1px solid #cbd5e1; border-radius:3px; padding:4px 10px; font-size:.82rem; font-weight:500; }
.acadwrap .para-pill.advanced{ background:#fef2f2; color:#991b1b; border:1px solid #dc2626; font-weight:700; }
.acadwrap .pdict-note{ font-size:.85rem; color:#64748b; }


/* === 究極-inspired dark theme (compact header) === */
body{ background:#0f172a!important; color:#e2e8f0!important; }
.hero{ background:linear-gradient(135deg,#1e293b,#0f172a)!important; border:1px solid #334155!important; border-radius:0 0 16px 16px!important; padding:13px 18px!important; box-shadow:none!important; overflow:hidden; }
.hero::after{ display:none!important; }
.hero .hbar{ display:flex; align-items:center; gap:9px; }
.hero .flag{ width:22px; height:22px; display:inline-flex; border-radius:3px; overflow:hidden; box-shadow:0 0 0 1px #334155; }
.hero h1{ margin:0!important; font-size:1.18rem!important; letter-spacing:.2px!important; color:#f1f5f9!important; }
.hero .sub{ font-size:.74rem!important; color:#94a3b8!important; margin-top:4px!important; }
.goal{ margin-top:8px!important; gap:4px 14px!important; font-size:.82rem!important; color:#cbd5e1!important; }
.goal .pill{ color:#cbd5e1!important; }
.goal .pill small{ color:#94a3b8!important; }
.meta-row,#updated,#totalcount{ color:#64748b!important; }
.search-box input{ background:#1e293b!important; border:1px solid #334155!important; color:#e2e8f0!important; }
.search-box input::placeholder{ color:#64748b!important; }
.chip{ background:#1e293b!important; border:1px solid #334155!important; color:#cbd5e1!important; }
.chip.active{ background:#dc2626!important; color:#fff!important; border-color:transparent!important; box-shadow:0 4px 12px rgba(220,38,38,.28)!important; }
.cat-head{ background:#1e293b!important; border:1px solid #334155!important; }
.cat-head .nm{ color:#e2e8f0!important; }
.cat-head .badge{ background:#334155!important; color:#fca5a5!important; }
.sublist .row{ background:#1e293b!important; border:1px solid #334155!important; }
.sublist .row .rtit,.row .rtit{ color:#e2e8f0!important; }
.sublist .grp-h,.grp-h{ color:#94a3b8!important; }
.chev2{ color:#475569!important; }
.empty{ color:#64748b!important; }
mark.q{ background:#f59e0b!important; color:#1f2430!important; }
/* reader dark */
.reader{ background:#0f172a!important; }
.reader-head{ background:#0f172a!important; border-bottom:1px solid #334155!important; }
.reader-head .rtitle{ color:#f1f5f9!important; }
.reader-head .back{ background:#334155!important; color:#e2e8f0!important; }
.reader-head .rclose{ color:#94a3b8!important; }
.crumbs{ color:#64748b!important; }
.doc{ color:#cbd5e1!important; }
.doc h1,.doc h2,.doc h3,.doc h4{ color:#f1f5f9!important; }
.doc h2{ border-left-color:#dc2626!important; }
.doc code{ background:#334155!important; color:#fca5a5!important; }
.doc th{ background:#1e293b!important; color:#f1f5f9!important; }
.doc td,.doc th,.doc table{ border-color:#334155!important; }
.doc tr:nth-child(even) td{ background:#172033!important; }
.doc blockquote{ background:#1e293b!important; border-left-color:#f59e0b!important; color:#e2e8f0!important; }
.doc a.ext{ color:#93c5fd!important; }
.doc a.rlink{ background:#334155!important; color:#e2e8f0!important; border-color:#475569!important; }
.doc hr{ border-top-color:#334155!important; }
.doc .imgph{ background:#334155!important; color:#94a3b8!important; }
.fallback,.fbnote{ color:#94a3b8!important; }
.fallback .fbicon{ filter:none; }
/* academic dict: dark + red accents (究極) */
.acadwrap .pdict-sec{ color:#f1f5f9!important; border-bottom-color:#475569!important; }
.acadwrap .pdict-hw{ color:#f1f5f9!important; border-bottom-color:#dc2626!important; }
.acadwrap .pdict-jp{ color:#94a3b8!important; }
.acadwrap .pdict-meta{ color:#64748b!important; }
.acadwrap .para-pill{ background:#1e293b!important; color:#e2e8f0!important; border:1px solid #475569!important; }
.acadwrap .para-pill.advanced{ background:#3f1d1d!important; color:#fca5a5!important; border:1px solid #dc2626!important; }
.acadwrap .pdict-note{ color:#94a3b8!important; }


/* fixes: remove white, smaller title (究極寄り) */
.grp-h{ background:transparent!important; color:#94a3b8!important; border-top:1px solid #1e293b; }
.sublist{ background:transparent!important; }
.toolbar{ background:transparent!important; }
.search-box input:focus{ border-color:#dc2626!important; box-shadow:0 0 0 3px rgba(220,38,38,.18)!important; }
.hero{ padding:11px 16px!important; }
.hero h1{ font-size:.98rem!important; letter-spacing:.2px!important; }
.hero .sub{ font-size:.7rem!important; margin-top:3px!important; }
.hero .flag{ width:20px!important; height:20px!important; }
.hero .goal{ font-size:.78rem!important; margin-top:7px!important; }
.doc th{ background:#1e293b!important; }

/* 究極-style compact header (transparent, no banner) */
.hero{ background:transparent!important; border:none!important; border-radius:0!important; box-shadow:none!important; padding:14px 2px 6px!important; display:block!important; }
.hero::after{ display:none!important; }
.hero .hbrand{ display:flex; align-items:center; gap:10px; }
.hero .flag{ width:40px!important; height:40px!important; border-radius:9px!important; background:#1e293b!important; box-shadow:0 0 0 1px #334155; display:inline-flex!important; align-items:center; justify-content:center; overflow:hidden; flex:none; }
.hero .flag svg{ width:30px!important; height:30px!important; }
.hero .brand{ display:flex; flex-direction:column; min-width:0; }
.hero .ttl{ font-size:19px!important; font-weight:800!important; color:#f1f5f9!important; line-height:1.15; letter-spacing:.2px; }
.hero .sub{ font-size:11px!important; color:#94a3b8!important; margin:2px 0 0!important; }
.hero .goal{ margin-top:9px!important; font-size:11px!important; color:#94a3b8!important; gap:2px 12px!important; }
.hero .goal .pill{ color:#94a3b8!important; }
.hero .goal .pill small{ color:#64748b!important; }
.hero .meta-row{ margin-top:5px!important; font-size:11px!important; color:#64748b!important; display:flex; gap:14px; }

/* hide goal + meta rows in header */
.hero .goal, .hero .meta-row{ display:none!important; }

/* non-sticky toolbar + chips (fix overlap) */
.toolbar{ position:static!important; background:transparent!important; }
.chips{ position:static!important; }

/* tables fill width (fix empty right gap) */
.doc table{ display:table!important; width:100%!important; table-layout:auto!important; overflow:visible!important; }
.doc td:last-child, .doc th:last-child{ width:auto; }
.doc td, .doc th{ word-break:break-word; }

/* dark tap-state */
.row:active{ background:#334155!important; }
.cat-head:active{ background:#334155!important; }

/* narrower centered column (Advisor-like) */
.wrap{ max-width:820px!important; }
</style>
</head>
<body>

## 動詞句・構文系
- **Phrasal verb** — 句動詞（例: give up）
- **Prepositional verb** — 前置詞動詞（例: look at）
- **Idiom** — 慣用句
- **Collocation** — 連語（自然な語の組み合わせ）
- **Compound verb** — 複合動詞
- **Auxiliary verb** — 助動詞
- **Modal verb** — 法助動詞（can, must 等）
- **Linking verb / Copula** — 連結動詞（be, seem 等）
- **Transitive verb** — 他動詞
- **Intransitive verb** — 自動詞
- **Ditransitive verb** — 二重目的語動詞
- **Causative verb** — 使役動詞（make, let 等）
- **Stative verb** — 状態動詞
- **Dynamic verb** — 動作動詞
- **Gerund** — 動名詞
- **Infinitive** — 不定詞
- **Participle** — 分詞（present/past participle）
## 文の要素・構造
- **Subject / Predicate** — 主語 / 述部
- **Object** (direct/indirect) — 目的語（直接/間接）
- **Complement** — 補語
- **Modifier** — 修飾語
- **Clause** — 節（main / subordinate / relative）
- **Phrase** — 句（noun/verb/adj/adv/prep phrase）
- **Antecedent** — 先行詞
- **Apposition** — 同格
## 品詞
- **Noun / Pronoun / Adjective / Adverb**
- **Preposition / Conjunction / Interjection**
- **Determiner** — 限定詞（a, the, this 等）
- **Quantifier** — 数量詞（some, many 等）
- **Article** — 冠詞（definite / indefinite）
## 時制・相・態
- **Tense** — 時制
- **Aspect** — 相（perfect / progressive）
- **Voice** — 態（active / passive）
- **Mood** — 法（indicative / imperative / subjunctive）
- **Conditional** — 条件法
- **Subjunctive** — 仮定法
## 語形成・語彙
- **Affix / Prefix / Suffix** — 接辞 / 接頭辞 / 接尾辞
- **Root / Stem** — 語根 / 語幹
- **Inflection** — 語形変化
- **Derivation** — 派生
- **Compound** — 複合語
- **Conversion** — 品詞転換（名詞→動詞 等）
## 意味・修辞
- **Synonym / Antonym** — 同義語 / 反意語
- **Homonym / Homophone / Homograph** — 同音異義 / 同綴異義
- **Connotation / Denotation** — 含意 / 明示的意味
- **Nuance** — 語感
- **Register** — 言語使用域（formal / informal）
- **Figurative / Literal** — 比喩的 / 字義通り
- **Metaphor / Simile** — 隠喩 / 直喩
- **Hyperbole** — 誇張表現
- **Euphemism** — 婉曲表現
- **Cliché** — 使い古された表現
- **Proverb / Saying** — ことわざ / 格言
## 慣用表現の種類
- **Idiomatic expression** — 慣用表現
- **Fixed expression** — 固定表現
- **Set phrase** — 決まり文句
- **Binomial** — 二語連結（e.g., back and forth）
- **Catchphrase** — 決め台詞
- **Slang** — 俗語
- **Jargon** — 専門用語
- **Colloquialism** — 口語表現
## 文法現象・規則
- **Agreement / Concord** — 一致（subject-verb agreement）
- **Ellipsis** — 省略
- **Inversion** — 倒置
- **Cleft sentence** — 分裂文（It is X that…）
- **Reported / Indirect speech** — 間接話法
- **Direct speech** — 直接話法
- **Anaphora / Cataphora** — 前方照応 / 後方照応
- **Coordination / Subordination** — 等位 / 従位接続
## 発音・正書法
- **Syllable / Stress / Intonation** — 音節 / 強勢 / イントネーション
- **Phoneme / Morpheme** — 音素 / 形態素
- **Orthography** — 正書法
- **Contraction** — 短縮形（don't 等）

		## Phrasal Verb(句動詞)
		- \*<span color="yellow_bg">「動詞 + 副詞/前置詞」</span><span color="yellow_bg">**という特定**</span>**の**形（文法構造）\*\*に注目した分類です。2語以上が組み合わさって、一つの動詞のような働きをします。
		- **特徴**: 動詞単体とは異なる意味になることが多い。
		- **例**:
			- look after（世話をする）
			- put off（延期する）
			- get along（仲良くやる）

		## Idioms(慣用句)
		<span color="yellow_bg">個々の単語の意味からは全体の意味が推測できない\*\*「決まり文句（慣用句）」</span>**という**意味の性質\*\*に注目した分類です。
		- **特徴**: 形は動詞句に限らず、名詞句や文全体の形をとることもある。
		- **例**:
			- a piece of cake（朝飯前）
			- break a leg（頑張れ、成功を祈る）
			- under the weather（体調が悪い）

function colored(col, t){
  const bg = /_bg$/.test(col); const base = col.replace(/_bg$/,"");
  const ok = {gray:1,grey:1,brown:1,orange:1,yellow:1,green:1,blue:1,purple:1,pink:1,red:1};
  let b = ok[base] ? base : (bg ? "yellow" : "blue"); if (b==="grey") b="gray";
  const inner = esc(stripTags(t));
  return bg ? ('<mark class="hl hl-'+b+'">'+inner+'</mark>') : ('<span class="tc tc-'+b+'">'+inner+'</span>');
}
function inline(s){
  const tok = []; const stash = h => { tok.push(h); return "@@T"+(tok.length-1)+"@@"; };
  s = s.replace(/<page url="([^"]+)">([\s\S]*?)<\/page>/g,(_,u,t)=> stash('<a class="rlink" data-id="'+escAttr(idFromUrl(u))+'" data-title="'+escAttr(clean(t))+'">'+esc(clean(t))+' <span class="chev">›</span></a>'));
  s = s.replace(/<unknown[^>]*\/?>(?:[\s\S]*?<\/unknown>)?/g,"");
  s = s.replace(/!\[[^\]]*\]\(([^)]+)\)/g, ()=> stash('<span class="imgph">🖼 画像</span>'));
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,(_,t,u)=> stash('<a class="ext" href="'+escAttr(u)+'" target="_blank" rel="noopener">'+esc(t)+'</a>'));
  s = s.replace(/`([^`]+)`/g,(_,c)=> stash('<code>'+esc(c)+'</code>'));
  s = s.replace(/<span\s+color="([^"]*)"[^>]*>([\s\S]*?)<\/span>/g,(_,col,t)=> stash(colored(col,t)));
  s = s.replace(/<span[^>]*>([\s\S]*?)<\/span>/g,(_,t)=> esc(stripTags(t)));
  s = esc(s);
  s = s.replace(/\\([*_~])/g,"$1");
  s = s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
  s = s.replace(/(^|[^*])\*([^*\s][^*]*?)\*(?!\*)/g,"$1<em>$2</em>");
  s = s.replace(/@@T(\d+)@@/g,(_,i)=> tok[+i]);
  return s;
}
function mdToHtml(content){
  const tables = [];
  content = content.replace(/<table[^>]*>([\s\S]*?)<\/table>/g,(_,body)=>{
    let html = "<table>"; const rows = body.match(/<tr>[\s\S]*?<\/tr>/g) || [];
    rows.forEach((row,ri)=>{
      const cells = row.match(/<t[hd]>[\s\S]*?<\/t[hd]>/g) || [];
      html += "<tr>";
      cells.forEach(c=>{ const inner=c.replace(/^<t[hd]>/,"").replace(/<\/t[hd]>$/,""); const tag=ri===0?"th":"td"; html+="<"+tag+">"+inline(inner)+"</"+tag+">"; });
      html += "</tr>";
    });
    html += "</table>"; tables.push(html); return "@@TBL"+(tables.length-1)+"@@";
  });
  content = content.replace(/<\/?columns>/g,"\n").replace(/<\/?column>/g,"\n").replace(/<\/?colgroup>/g,"").replace(/<col[^>]*\/?>/g,"").replace(/<empty-block\/>/g,"").replace(/<table_of_contents[^>]*\/?>/g,"").replace(/<unknown[^>]*\/?>(?:[\s\S]*?<\/unknown>)?/g,"");
  const lines = content.split("\n");
  let html = "", inCode = false, codeBuf = [], para = [], listBuf = null, bq = [];
  const fP=()=>{ if(para.length){ html+="<p>"+inline(para.join(" "))+"</p>"; para=[]; } };
  const fL=()=>{ if(listBuf){ html+="<"+listBuf.type+">"+listBuf.items.map(x=>"<li>"+inline(x)+"</li>").join("")+"</"+listBuf.type+">"; listBuf=null; } };
  const fB=()=>{ if(bq.length){ html+="<blockquote>"+inline(bq.join(" "))+"</blockquote>"; bq=[]; } };
  const fA=()=>{ fP(); fL(); fB(); };
  for (let i=0;i<lines.length;i++){
    let ln = lines[i];
    if (/^\s*```/.test(ln)){ if(inCode){ html+="<pre><code>"+esc(codeBuf.join("\n"))+"</code></pre>"; codeBuf=[]; inCode=false; } else { fA(); inCode=true; } continue; }
    if (inCode){ codeBuf.push(ln); continue; }
    if (/@@TBL\d+@@/.test(ln)){ fA(); html+=ln.replace(/@@TBL(\d+)@@/g,(_,k)=>tables[+k]); continue; }
    if (/^\s*$/.test(ln)){ fA(); continue; }
    let h = ln.match(/^[	 ]*(#{1,6})\s+(.*)$/);
    if (h){ fA(); const lvl=Math.min(h[1].length+1,6); html+="<h"+lvl+">"+inline(h[2])+"</h"+lvl+">"; continue; }
    if (/^\s*---+\s*$/.test(ln)){ fA(); html+="<hr>"; continue; }
    let q = ln.match(/^\s*>\s?(.*)$/);
    if (q){ fP(); fL(); bq.push(q[1]); continue; }
    let li = ln.match(/^(\s*)[-*]\s+(.*)$/);
    if (li){ fP(); fB(); if(!listBuf||listBuf.type!=="ul"){ fL(); listBuf={type:"ul",items:[]}; } listBuf.items.push(li[2]); continue; }
    let ol = ln.match(/^(\s*)\d+\.\s+(.*)$/);
    if (ol){ fP(); fB(); if(!listBuf||listBuf.type!=="ol"){ fL(); listBuf={type:"ol",items:[]}; } listBuf.items.push(ol[2]); continue; }
    fL(); fB(); para.push(ln);
  }
  if (inCode && codeBuf.length) html+="<pre><code>"+esc(codeBuf.join("\n"))+"</code></pre>";
  fA(); return html;
}


const ACAD_ID="317f5dfa5cb38069945cc06849e9b6fe";const PVI_ID="359f5dfa5cb380eb8de0fb359a3d9b8f";let pviTab="pv";function splitPVI(body){body=String(body||'');const idx=body.search(/[	 ]*##\s*Idioms\(/);return idx===-1?{pv:body,id:''}:{pv:body.slice(0,idx),id:body.slice(idx)};}
function pd_words(src){
  const words=[]; src=src.replace(/\*\([^)]*\)\*/g,'');
  const re=/<span color="yellow_bg">([\s\S]*?)<\/span>/g; let last=0,m;
  const push=(text,adv)=>{ text.split('/').forEach(tok=>{ let w=tok.replace(/<[^>]+>/g,'').replace(/\*\*/g,'').trim(); if(!w)return; if(/→/.test(w))return; if(/\(see/i.test(w)||/^see\s/i.test(w))return; if(/[぀-ヿ㐀-鿿]/.test(w))return; words.push({w,adv}); }); };
  while((m=re.exec(src))){ if(m.index>last)push(src.slice(last,m.index),false); push(m[1],true); last=re.lastIndex; }
  if(last<src.length)push(src.slice(last),false); return words;
}
function renderParaDict(md){
  const lines=String(md).split('\n'); const secs=[]; let sec=null,ent=null;
  const POS={'動詞':'動詞 (VERB)','名詞':'名詞 (NOUN)','形容詞':'形容詞 (ADJ)','副詞':'副詞 (ADV)'};
  for(let raw of lines){
    if(!raw.trim())continue;
    if(/^<(table_of_contents|empty-block)/.test(raw.trim()))continue;
    if(/^---+$/.test(raw.trim()))continue;
    let mS=raw.match(/^##\s+(.*)$/);
    if(mS){ let t=mS[1],label=t; for(const k in POS){ if(t.indexOf(k)>=0){label=POS[k];break;} } sec={label:label,entries:[]}; secs.push(sec); ent=null; continue; }
    let mTop=raw.match(/^-\s+(.*)$/);
    if(mTop){ ent={head:mTop[1],rows:[],note:''}; if(sec)sec.entries.push(ent); continue; }
    let mSub=raw.match(/^[\t ]+-\s+(.*)$/);
    if(mSub&&ent){ let row=mSub[1];
      if(/(see\s|→)/.test(row)&&!/\//.test(row)){ ent.note=row.replace(/\*\(([^)]*)\)\*/g,'($1)').replace(/<[^>]+>/g,'').replace(/\*\*/g,'').trim(); continue; }
      if(/^[A-E]\.\s/.test(row))continue;
      let ml=row.match(/^\*\*[^*]+\*\*\s*[:：]\s*(.*)$/); if(ml)row=ml[1];
      ent.rows.push(row);
    }
  }
  let html='';
  for(const s of secs){
    html+='<div class="pdict-sec">'+esc(s.label)+' ('+s.entries.length+')</div>';
    for(const e of s.entries){
      let bold=(e.head.match(/\*\*([^*]+)\*\*/)||[])[1]||e.head; let eng=bold,jp='';
      let g=bold.match(/^([^（]+)（([^）]*)）/);
      if(g){eng=g[1].trim();jp=g[2].trim();} else {eng=bold.replace(/（.*$/,'').trim();}
      let words=[]; e.rows.forEach(function(r){words=words.concat(pd_words(r));});
      const adv=words.filter(function(w){return w.adv;}).length;
      html+='<div class="pdict-entry"><div class="pdict-head"><span class="pdict-hw">'+esc(eng)+'</span>';
      if(jp)html+='<span class="pdict-jp">'+esc(jp)+'</span>';
      if(words.length)html+='<span class="pdict-meta">'+words.length+'語 ・ 高得点'+adv+'</span>';
      html+='</div>';
      if(words.length){ html+='<div class="pdict-chips">'; for(const w of words){html+='<span class="para-pill'+(w.adv?' advanced':'')+'">'+esc(w.w)+'</span>';} html+='</div>'; }
      else if(e.note){ html+='<div class="pdict-note">'+esc(e.note)+'</div>'; }
      html+='</div>';
    }
  }
  return html;
}

function openPage(id, title, accent){ navStack.push({ id, title:title||"", accent:accent||"#7048e8" }); renderReader(); }
function renderReader(){
  const reader = document.getElementById("reader");
  reader.classList.add("open");
  const cur = navStack[navStack.length-1];
  document.documentElement.style.setProperty("--rac", cur.accent || "#7048e8");
  document.getElementById("rtitle").textContent = cur.title || "";
  document.getElementById("rback").style.visibility = navStack.length>1 ? "visible" : "hidden";
  document.getElementById("crumbs").textContent = navStack.map(s=>s.title).filter(Boolean).join("  ›  ");
  const doc = document.getElementById("rdoc");
  document.querySelector(".reader-body").scrollTop = 0;
  const md = SNAP[cur.id];
  if (md){
    doc.innerHTML = (cur.id===ACAD_ID?renderParaDict(md):mdToHtml(md)) || '<p class="empty">表示できる本文がありません。</p>';
  } else {
    doc.innerHTML = '<div class="fallback"><div class="fbicon">📖</div>'+
      '<p><b>'+esc(cur.title||"このページ")+'</b> の詳しい解説は、元のNotionにあります。</p>'+
      '<a class="fbbtn" href="https://www.notion.so/'+cur.id+'" target="_blank" rel="noopener">Notionで開く ↗</a>'+
      '<p class="fbnote">このアプリには8カテゴリの一覧・横断検索と、主要ページ（文法用語集・ことわざ表など）を収録しています。</p></div>';
  }
}
function readerBack(){ if (navStack.length>1){ navStack.pop(); renderReader(); } else closeReader(); }
function closeReader(){ document.getElementById("reader").classList.remove("open"); navStack=[]; }

function highlight(text,q){
  if(!q) return esc(text);
  const idx=text.toLowerCase().indexOf(q.toLowerCase());
  if(idx===-1) return esc(text);
  return esc(text.slice(0,idx))+'<mark class="q">'+esc(text.slice(idx,idx+q.length))+"</mark>"+esc(text.slice(idx+q.length));
}
function renderChips(){
  const el=document.getElementById("chips");
  let html='';
  for(const d of DATA){ html+='<div class="chip '+(activeFilter==String(d.section.n)?'active':'')+'" data-f="'+d.section.n+'" style="--ac:'+d.section.c+'"><span class="num">'+d.section.num+'</span><span class="nmv">'+esc(d.section.name)+'</span></div>'; }
  el.innerHTML=html;
  el.querySelectorAll(".chip").forEach(c=>{ c.onclick=()=>{ activeFilter=c.dataset.f; lsSet(FILTER_KEY,activeFilter); renderChips(); render(); window.scrollTo({top:0}); }; });
}
function render(){
  const content=document.getElementById("content");
  const q=query.trim();
  const visible = q ? DATA : DATA.filter(d=>String(d.section.n)===activeFilter);
  let html="", shown=0;
  for(const d of visible){
    const ac=d.section.c;
    const items=q? d.items.filter(it=>(it.title+" "+it.group+" "+(SNAP[it.id]||"")).toLowerCase().includes(q.toLowerCase())) : d.items;
    const catMatch = q ? d.section.name.toLowerCase().includes(q.toLowerCase()) : false;
    if(q && items.length===0 && !catMatch) continue;
    shown += items.length + (catMatch?1:0);
    html+='<div class="cat" style="--ac:'+ac+'">';
    if(q){
      html+='<div class="cat-head" data-id="'+escAttr(d.section.id)+'" data-title="'+escAttr(d.section.name)+'" data-ac="'+ac+'">'+
          '<span class="num">'+d.section.num+'</span><span class="ic">'+d.section.icon+'</span><span class="nm">'+esc(d.section.name)+'</span>'+
          (d.items.length?'<span class="badge">'+d.items.length+'</span>':'')+'<span class="chev2">›</span></div>';
    }
    const isPVI=d.section.id===PVI_ID&&!q;const dispItems=isPVI?items.filter(function(it){return /^Idiom/.test(it.group||'')===(pviTab==='id');}):items;if(isPVI){html+='<div style="display:flex;gap:6px;margin-bottom:10px">'+'<button data-pvitab="pv" style="flex:1;padding:8px 10px;border-radius:10px;border:1px solid '+(pviTab==='pv'?ac:'rgba(150,150,150,.35)')+';background:'+(pviTab==='pv'?ac:'transparent')+';color:'+(pviTab==='pv'?'#fff':'inherit')+';font-size:13px;font-weight:600;cursor:pointer">Phrasal Verbs</button>'+'<button data-pvitab="id" style="flex:1;padding:8px 10px;border-radius:10px;border:1px solid '+(pviTab==='id'?ac:'rgba(150,150,150,.35)')+';background:'+(pviTab==='id'?ac:'transparent')+';color:'+(pviTab==='id'?'#fff':'inherit')+';font-size:13px;font-weight:600;cursor:pointer">Idioms</button>'+'</div>';}if(dispItems.length){
      html+='<div class="sublist">';
      let lastG=null;
      for(const it of dispItems){
        if(it.group && it.group!==lastG){ html+='<div class="grp-h">'+esc(it.group)+'</div>'; lastG=it.group; }
        html+='<div class="row" data-id="'+escAttr(it.id)+'" data-title="'+escAttr(it.title)+'" data-ac="'+ac+'"><span class="rtit">'+highlight(it.title,q)+'</span><span class="chev2">›</span></div>';
      }
      html+='</div>';
    } if(!q){
      const body = SNAP[d.section.id];const bodyShown=isPVI?(pviTab==='id'?splitPVI(body).id:splitPVI(body).pv):body;
      if(d.section.id===ACAD_ID){ html+='<div class="acadwrap">'+renderParaDict(body||'')+'</div>'; }
      else html+='<div class="doc catdoc" style="--rac:'+ac+'">'+(bodyShown?mdToHtml(bodyShown):'<p class="empty">本文がありません。</p>')+'</div>';
    }
    html+='</div>';
  }
  if(shown===0 && q) html='<div class="empty">「'+esc(q)+'」に一致する項目は見つかりませんでした。</div>';
  content.innerHTML=html;
  document.getElementById("clear").style.display=q?"block":"none";
}
function load(){
  if(!SECTIONS.some(s=>String(s.n)===activeFilter)) activeFilter="1";
  DATA = SECTIONS.map(sec=>({ section:sec, items:parseList(SNAP[sec.id]||"") }));
  const gram = DATA.find(d=>d.section.n===1);
  if(gram){ gram.items.unshift({ title:"Learn English in English（基礎用語集）", id:LEARN_EN_ID, group:"" }); }
  const total=DATA.reduce((a,d)=>a+d.items.length,0);
  document.getElementById("updated").textContent="📚 収録 "+SECTIONS.length+" カテゴリ";
  document.getElementById("totalcount").textContent="🔎 "+total+" ページを横断検索";
  renderChips(); render();
}

document.getElementById("q").addEventListener("input",e=>{ query=e.target.value; render(); });
document.getElementById("clear").addEventListener("click",()=>{ query=""; document.getElementById("q").value=""; render(); });
document.getElementById("content").addEventListener("click",e=>{ const pvt=e.target.closest("[data-pvitab]");if(pvt){pviTab=pvt.dataset.pvitab;render();return;}const el=e.target.closest("[data-id]"); if(el && el.dataset.id) openPage(el.dataset.id, el.dataset.title, el.dataset.ac); });
document.getElementById("rdoc").addEventListener("click",e=>{ const l=e.target.closest("a.rlink"); if(l){ e.preventDefault(); openPage(l.dataset.id, l.dataset.title, navStack.length?navStack[navStack.length-1].accent:"#7048e8"); } });
document.getElementById("rback").addEventListener("click",readerBack);
document.getElementById("rclose").addEventListener("click",closeReader);

// load deep pages (all sub-pages) from data.json, then render
(function(){
  const content=document.getElementById("content");
  content.innerHTML='<div class="empty">📚 全ページを読み込み中…</div>';
  if(typeof fetch!=="function"){ load(); return; }
  fetch('./data.json',{cache:'no-store'})
    .then(r=> r.ok ? r.json() : null)
    .then(j=>{ if(j){ for(const k in j){ if(!(k in SNAP)) SNAP[k]=j[k]; } } })
    .catch(()=>{})
    .then(load);
})();
