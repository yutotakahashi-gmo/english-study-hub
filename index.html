## 動詞句・構文系
- **Phrasal verb** — 句動詞（例: give up）
- **Prepositional verb** — 前置詞動詞（例: look at）
- **Idiom** — 慣用句
- **Collocation** — 連語（自然な語の組み合わせ）
- **Compound verb** — 複合動詞
- **Auxiliary verb** — 助動詞
- **Modal verb** — 法助動詞（can, must 等）
- **Linking verb / Copula** — 連結動詞（be, seem 等）
- **Transitive verb** — 他動詞
- **Intransitive verb** — 自動詞
- **Ditransitive verb** — 二重目的語動詞
- **Causative verb** — 使役動詞（make, let 等）
- **Stative verb** — 状態動詞
- **Dynamic verb** — 動作動詞
- **Gerund** — 動名詞
- **Infinitive** — 不定詞
- **Participle** — 分詞（present/past participle）
## 文の要素・構造
- **Subject / Predicate** — 主語 / 述部
- **Object** (direct/indirect) — 目的語（直接/間接）
- **Complement** — 補語
- **Modifier** — 修飾語
- **Clause** — 節（main / subordinate / relative）
- **Phrase** — 句（noun/verb/adj/adv/prep phrase）
- **Antecedent** — 先行詞
- **Apposition** — 同格
## 品詞
- **Noun / Pronoun / Adjective / Adverb**
- **Preposition / Conjunction / Interjection**
- **Determiner** — 限定詞（a, the, this 等）
- **Quantifier** — 数量詞（some, many 等）
- **Article** — 冠詞（definite / indefinite）
## 時制・相・態
- **Tense** — 時制
- **Aspect** — 相（perfect / progressive）
- **Voice** — 態（active / passive）
- **Mood** — 法（indicative / imperative / subjunctive）
- **Conditional** — 条件法
- **Subjunctive** — 仮定法
## 語形成・語彙
- **Affix / Prefix / Suffix** — 接辞 / 接頭辞 / 接尾辞
- **Root / Stem** — 語根 / 語幹
- **Inflection** — 語形変化
- **Derivation** — 派生
- **Compound** — 複合語
- **Conversion** — 品詞転換（名詞→動詞 等）
## 意味・修辞
- **Synonym / Antonym** — 同義語 / 反意語
- **Homonym / Homophone / Homograph** — 同音異義 / 同綴異義
- **Connotation / Denotation** — 含意 / 明示的意味
- **Nuance** — 語感
- **Register** — 言語使用域（formal / informal）
- **Figurative / Literal** — 比喩的 / 字義通り
- **Metaphor / Simile** — 隠喩 / 直喩
- **Hyperbole** — 誇張表現
- **Euphemism** — 婉曲表現
- **Cliché** — 使い古された表現
- **Proverb / Saying** — ことわざ / 格言
## 慣用表現の種類
- **Idiomatic expression** — 慣用表現
- **Fixed expression** — 固定表現
- **Set phrase** — 決まり文句
- **Binomial** — 二語連結（e.g., back and forth）
- **Catchphrase** — 決め台詞
- **Slang** — 俗語
- **Jargon** — 専門用語
- **Colloquialism** — 口語表現
## 文法現象・規則
- **Agreement / Concord** — 一致（subject-verb agreement）
- **Ellipsis** — 省略
- **Inversion** — 倒置
- **Cleft sentence** — 分裂文（It is X that…）
- **Reported / Indirect speech** — 間接話法
- **Direct speech** — 直接話法
- **Anaphora / Cataphora** — 前方照応 / 後方照応
- **Coordination / Subordination** — 等位 / 従位接続
## 発音・正書法
- **Syllable / Stress / Intonation** — 音節 / 強勢 / イントネーション
- **Phoneme / Morpheme** — 音素 / 形態素
- **Orthography** — 正書法
- **Contraction** — 短縮形（don't 等）

## Phrasal Verb(句動詞)
- 「動詞 + 副詞/前置詞」という特定の形（文法構造）に注目した分類です。2語以上が組み合わさって、一つの動詞のような働きをします。
- **特徴**: 動詞単体とは異なる意味になることが多い。
- **例**: look after（世話をする） / put off（延期する） / get along（仲良くやる）
## Idioms(慣用句)
個々の単語の意味からは全体の意味が推測できない「決まり文句（慣用句）」という意味の性質に注目した分類です。
- **特徴**: 形は動詞句に限らず、名詞句や文全体の形をとることもある。
- **例**: a piece of cake（朝飯前） / break a leg（頑張れ、成功を祈る） / under the weather（体調が悪い）

<script>
const SECTIONS = [
  { n:0, icon:"📘", name:"Learn English in English", id:"359f5dfa5cb3809c8a9dc3d063cf8092", c:"#4263eb" },
  { n:1, icon:"📝", name:"Grammar",                   id:"2f7f5dfa5cb380ce8b6ed985dca41e7c", c:"#7048e8" },
  { n:2, icon:"📚", name:"Vocabulary",                id:"2f7f5dfa5cb3809a847cf2406e0c9cc8", c:"#ae3ec9" },
  { n:3, icon:"💬", name:"Casual English・Slangs",    id:"2f7f5dfa5cb380508ab2c6754628cfe4", c:"#d6336c" },
  { n:4, icon:"🔐", name:"Cybersecurity English",     id:"2f7f5dfa5cb3809e941ede8ba83ff11f", c:"#0ca678" },
  { n:5, icon:"💼", name:"Business English",          id:"2f7f5dfa5cb380fe9a9dd3a762b97252", c:"#f59f00" },
  { n:6, icon:"✨", name:"Expressions",               id:"2fef5dfa5cb3803f8d3ccdf7f8a22b0d", c:"#e8590c" },
  { n:7, icon:"🔗", name:"Phrasal Verb / Idioms",     id:"359f5dfa5cb380eb8de0fb359a3d9b8f", c:"#1098ad" },
];
const FILTER_KEY = "englishhub_filter";
function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

const SNAP = {};
document.querySelectorAll('script[type="text/plain"][data-pageid]').forEach(s=>{ SNAP[s.dataset.pageid] = s.textContent; });

let DATA = [];
let activeFilter = lsGet(FILTER_KEY) || "all";
let query = "";
let navStack = [];

function esc(s){ return String(s).replace(/[&<>"]/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c])); }
function escAttr(s){ return esc(s).replace(/'/g,"&#39;"); }
function idFromUrl(u){ const m = String(u).match(/[0-9a-f]{32}/i); return m ? m[0] : u; }
function stripTags(t){ return String(t).replace(/<[^>]+>/g,""); }
function clean(t){
  return String(t)
    .replace(/<span[^>]*>/g,"").replace(/<\/span>/g,"")
    .replace(/<[^>]+>/g,"")
    .replace(/\\([*_~`])/g,"$1")
    .replace(/[`*_]/g,"")
    .replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">")
    .replace(/\s+/g," ").trim();
}
function parseList(md){
  const items = []; const seen = new Set();
  const re = /(^|\n)[ \t]*#{2,4}\s+(.+)|<page url="([^"]+)">([\s\S]*?)<\/page>|(^|\n)[ \t]*[-*]\s+([^\n]+)/g;
  let m, curGroup = "";
  while ((m = re.exec(md)) !== null){
    if (m[2] !== undefined){ curGroup = clean(m[2]); }
    else if (m[3]){ const t = clean(m[4]); if (t && !seen.has(t)){ seen.add(t); items.push({ title:t, id:idFromUrl(m[3]), group:curGroup }); } }
    else if (m[6] !== undefined){
      const t = clean(m[6]);
      if (t && t.length<=120 && !/^(例|特徴|特性)[:：]?$/.test(t) && !seen.has(t)){ seen.add(t); items.push({ title:t, id:null, group:curGroup }); }
    }
  }
  return items;
}
function colored(col, t){
  const bg = /_bg$/.test(col); const base = col.replace(/_bg$/,"");
  const ok = {gray:1,grey:1,brown:1,orange:1,yellow:1,green:1,blue:1,purple:1,pink:1,red:1};
  let b = ok[base] ? base : (bg ? "yellow" : "blue"); if (b==="grey") b="gray";
  const inner = esc(stripTags(t));
  return bg ? ('<mark class="hl hl-'+b+'">'+inner+'</mark>') : ('<span class="tc tc-'+b+'">'+inner+'</span>');
}
function inline(s){
  const tok = []; const stash = h => { tok.push(h); return "@@T"+(tok.length-1)+"@@"; };
  s = s.replace(/<page url="([^"]+)">([\s\S]*?)<\/page>/g,(_,u,t)=> stash('<a class="rlink" data-id="'+escAttr(idFromUrl(u))+'" data-title="'+escAttr(clean(t))+'">'+esc(clean(t))+' <span class="chev">›</span></a>'));
  s = s.replace(/<unknown[^>]*\/?>(?:[\s\S]*?<\/unknown>)?/g,"");
  s = s.replace(/!\[[^\]]*\]\(([^)]+)\)/g, ()=> stash('<span class="imgph">🖼 画像</span>'));
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,(_,t,u)=> stash('<a class="ext" href="'+escAttr(u)+'" target="_blank" rel="noopener">'+esc(t)+'</a>'));
  s = s.replace(/`([^`]+)`/g,(_,c)=> stash('<code>'+esc(c)+'</code>'));
  s = s.replace(/<span\s+color="([^"]*)"[^>]*>([\s\S]*?)<\/span>/g,(_,col,t)=> stash(colored(col,t)));
  s = s.replace(/<span[^>]*>([\s\S]*?)<\/span>/g,(_,t)=> esc(stripTags(t)));
  s = esc(s);
  s = s.replace(/\\([*_~])/g,"$1");
  s = s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
  s = s.replace(/(^|[^*])\*([^*\s][^*]*?)\*(?!\*)/g,"$1<em>$2</em>");
  s = s.replace(/@@T(\d+)@@/g,(_,i)=> tok[+i]);
  return s;
}
function mdToHtml(content){
  const tables = [];
  content = content.replace(/<table[^>]*>([\s\S]*?)<\/table>/g,(_,body)=>{
    let html = "<table>"; const rows = body.match(/<tr>[\s\S]*?<\/tr>/g) || [];
    rows.forEach((row,ri)=>{
      const cells = row.match(/<t[hd]>[\s\S]*?<\/t[hd]>/g) || [];
      html += "<tr>";
      cells.forEach(c=>{ const inner=c.replace(/^<t[hd]>/,"").replace(/<\/t[hd]>$/,""); const tag=ri===0?"th":"td"; html+="<"+tag+">"+inline(inner)+"</"+tag+">"; });
      html += "</tr>";
    });
    html += "</table>"; tables.push(html); return "@@TBL"+(tables.length-1)+"@@";
  });
  content = content.replace(/<\/?columns>/g,"\n").replace(/<\/?column>/g,"\n").replace(/<\/?colgroup>/g,"").replace(/<col[^>]*\/?>/g,"").replace(/<empty-block\/>/g,"").replace(/<unknown[^>]*\/?>(?:[\s\S]*?<\/unknown>)?/g,"");
  const lines = content.split("\n");
  let html = "", inCode = false, codeBuf = [], para = [], listBuf = null, bq = [];
  const fP=()=>{ if(para.length){ html+="<p>"+inline(para.join(" "))+"</p>"; para=[]; } };
  const fL=()=>{ if(listBuf){ html+="<"+listBuf.type+">"+listBuf.items.map(x=>"<li>"+inline(x)+"</li>").join("")+"</"+listBuf.type+">"; listBuf=null; } };
  const fB=()=>{ if(bq.length){ html+="<blockquote>"+inline(bq.join(" "))+"</blockquote>"; bq=[]; } };
  const fA=()=>{ fP(); fL(); fB(); };
  for (let i=0;i<lines.length;i++){
    let ln = lines[i];
    if (/^\s*```/.test(ln)){ if(inCode){ html+="<pre><code>"+esc(codeBuf.join("\n"))+"</code></pre>"; codeBuf=[]; inCode=false; } else { fA(); inCode=true; } continue; }
    if (inCode){ codeBuf.push(ln); continue; }
    if (/@@TBL\d+@@/.test(ln)){ fA(); html+=ln.replace(/@@TBL(\d+)@@/g,(_,k)=>tables[+k]); continue; }
    if (/^\s*$/.test(ln)){ fA(); continue; }
    let h = ln.match(/^(#{1,6})\s+(.*)$/);
    if (h){ fA(); const lvl=Math.min(h[1].length+1,6); html+="<h"+lvl+">"+inline(h[2])+"</h"+lvl+">"; continue; }
    if (/^\s*---+\s*$/.test(ln)){ fA(); html+="<hr>"; continue; }
    let q = ln.match(/^\s*>\s?(.*)$/);
    if (q){ fP(); fL(); bq.push(q[1]); continue; }
    let li = ln.match(/^(\s*)[-*]\s+(.*)$/);
    if (li){ fP(); fB(); if(!listBuf||listBuf.type!=="ul"){ fL(); listBuf={type:"ul",items:[]}; } listBuf.items.push(li[2]); continue; }
    let ol = ln.match(/^(\s*)\d+\.\s+(.*)$/);
    if (ol){ fP(); fB(); if(!listBuf||listBuf.type!=="ol"){ fL(); listBuf={type:"ol",items:[]}; } listBuf.items.push(ol[2]); continue; }
    fL(); fB(); para.push(ln);
  }
  if (inCode && codeBuf.length) html+="<pre><code>"+esc(codeBuf.join("\n"))+"</code></pre>";
  fA(); return html;
}

function openPage(id, title, accent){ navStack.push({ id, title:title||"", accent:accent||"#7048e8" }); renderReader(); }
function renderReader(){
  const reader = document.getElementById("reader");
  reader.classList.add("open");
  const cur = navStack[navStack.length-1];
  document.documentElement.style.setProperty("--rac", cur.accent || "#7048e8");
  document.getElementById("rtitle").textContent = cur.title || "";
  document.getElementById("rback").style.visibility = navStack.length>1 ? "visible" : "hidden";
  document.getElementById("crumbs").textContent = navStack.map(s=>s.title).filter(Boolean).join("  ›  ");
  const doc = document.getElementById("rdoc");
  document.querySelector(".reader-body").scrollTop = 0;
  const md = SNAP[cur.id];
  if (md){
    doc.innerHTML = mdToHtml(md) || '<p class="empty">表示できる本文がありません。</p>';
  } else {
    doc.innerHTML = '<div class="fallback"><div class="fbicon">📖</div>'+
      '<p><b>'+esc(cur.title||"このページ")+'</b> の詳しい解説は、元のNotionにあります。</p>'+
      '<a class="fbbtn" href="https://www.notion.so/'+cur.id+'" target="_blank" rel="noopener">Notionで開く ↗</a>'+
      '<p class="fbnote">このアプリには8カテゴリの一覧・横断検索と、主要ページ（文法用語集・ことわざ表など）を収録しています。</p></div>';
  }
}
function readerBack(){ if (navStack.length>1){ navStack.pop(); renderReader(); } else closeReader(); }
function closeReader(){ document.getElementById("reader").classList.remove("open"); navStack=[]; }

function highlight(text,q){
  if(!q) return esc(text);
  const idx=text.toLowerCase().indexOf(q.toLowerCase());
  if(idx===-1) return esc(text);
  return esc(text.slice(0,idx))+'<mark class="q">'+esc(text.slice(idx,idx+q.length))+"</mark>"+esc(text.slice(idx+q.length));
}
function renderChips(){
  const el=document.getElementById("chips");
  const total=DATA.reduce((a,d)=>a+d.items.length,0);
  let html='<div class="chip '+(activeFilter==='all'?'active':'')+'" data-f="all" style="--ac:#5667d6"><span class="dot"></span>すべて <span class="cnt">'+total+'</span></div>';
  for(const d of DATA){ html+='<div class="chip '+(activeFilter==String(d.section.n)?'active':'')+'" data-f="'+d.section.n+'" style="--ac:'+d.section.c+'"><span class="dot"></span>'+esc(d.section.name)+' <span class="cnt">'+d.items.length+'</span></div>'; }
  el.innerHTML=html;
  el.querySelectorAll(".chip").forEach(c=>{ c.onclick=()=>{ activeFilter=c.dataset.f; lsSet(FILTER_KEY,activeFilter); render(); window.scrollTo({top:0}); }; });
}
function render(){
  const content=document.getElementById("content");
  const q=query.trim();
  const visible=DATA.filter(d=>activeFilter==="all"||String(d.section.n)===activeFilter);
  let html="", shown=0;
  for(const d of visible){
    const items=q? d.items.filter(it=>(it.title+" "+it.group).toLowerCase().includes(q.toLowerCase())) : d.items;
    if(items.length===0 && q) continue;
    shown+=items.length;
    const ac=d.section.c;
    html+='<div class="section" style="--ac:'+ac+'"><h2><span class="ic">'+d.section.icon+'</span><span>'+esc(d.section.name)+'</span><span class="badge">'+items.length+'</span></h2>';
    if(items.length===0){ html+='<div class="empty" style="padding:16px;font-size:.82rem">項目がありません</div>'; }
    else{
      html+='<div class="grid">';
      for(const it of items){
        const pid = it.id || d.section.id;
        const ptitle = it.id ? it.title : d.section.name;
        html+='<div class="card" data-id="'+escAttr(pid)+'" data-title="'+escAttr(ptitle)+'" data-ac="'+ac+'"><span class="chev2">›</span>'+
              (it.group?'<span class="grp">'+esc(it.group)+'</span>':'')+highlight(it.title,q)+'</div>';
      }
      html+='</div>';
    }
    html+='</div>';
  }
  if(shown===0 && q) html='<div class="empty">「'+esc(q)+'」に一致する項目は見つかりませんでした。</div>';
  content.innerHTML=html;
  document.getElementById("clear").style.display=q?"block":"none";
}
function load(){
  DATA = SECTIONS.map(sec=>({ section:sec, items:parseList(SNAP[sec.id]||"") }));
  const total=DATA.reduce((a,d)=>a+d.items.length,0);
  document.getElementById("updated").textContent="📚 収録 "+SECTIONS.length+" カテゴリ";
  document.getElementById("totalcount").textContent="🔎 全 "+total+" 項目を検索";
  renderChips(); render();
}

document.getElementById("q").addEventListener("input",e=>{ query=e.target.value; render(); });
document.getElementById("clear").addEventListener("click",()=>{ query=""; document.getElementById("q").value=""; render(); });
document.getElementById("content").addEventListener("click",e=>{ const card=e.target.closest(".card"); if(card && card.dataset.id) openPage(card.dataset.id, card.dataset.title, card.dataset.ac); });
document.getElementById("rdoc").addEventListener("click",e=>{ const l=e.target.closest("a.rlink"); if(l){ e.preventDefault(); openPage(l.dataset.id, l.dataset.title, navStack.length?navStack[navStack.length-1].accent:"#7048e8"); } });
document.getElementById("rback").addEventListener("click",readerBack);
document.getElementById("rclose").addEventListener("click",closeReader);

// load deep pages (all sub-pages) from data.json, then render
(function(){
  const content=document.getElementById("content");
  content.innerHTML='<div class="empty">📚 全ページを読み込み中…</div>';
  if(typeof fetch!=="function"){ load(); return; }
  fetch('./data.json',{cache:'no-store'})
    .then(r=> r.ok ? r.json() : null)
    .then(j=>{ if(j){ for(const k in j){ if(!(k in SNAP)) SNAP[k]=j[k]; } } })
    .catch(()=>{})
    .then(load);
})();
</script>
</body>
</html>
